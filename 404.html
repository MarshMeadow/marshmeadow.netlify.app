<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Something Went Wrong</title>
    <style>
        body {
            background-color: #1b1b2e; /* Dark background */
            color: #ffffff; /* White text */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-image: url('https://example.com/cat-pattern.png'); /* Subtle cat-themed pattern */
            background-repeat: no-repeat;
            background-size: cover; /* Full screen */
        }
        h1 {
            font-size: 48px;
        }
        p {
            font-size: 24px;
            margin: 20px 0;
        }
        .goofy {
            font-size: 36px;
            color: #a5d6e5; /* Soft blue */
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #6a0572; /* Purple button */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #a05bc2; /* Lighter purple on hover */
        }
        .cat-emoji {
            font-size: 48px;
            margin: 20px 0;
        }
    </style>
    <script>
        setTimeout(function() {
            window.location.href = 'https://marshmeadow.netlify.app/'; // Redirect to the specified URL
        }, 5000);
    </script>
</head>
<body>
    <h1>Oops! 404 Error!</h1>
    <div class="cat-emoji">🐱</div> <!-- Cat emoji -->
    <p class="goofy">Looks like you've fallen into a black hole!</p>
    <p>Don’t worry, we’ll bring you back in a jiffy!</p>
    <a class="btn" href="#">Take Me Home!</a>
</body>
</html>
