<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Something Went Wrong</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 48px;
        }
        p {
            font-size: 24px;
            margin: 20px 0;
        }
        .goofy {
            font-size: 36px;
            color: #ffcc00;
            text-shadow: 2px 2px #000000;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #ff5722;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #e64a19;
        }
    </style>
    <script>
        setTimeout(function() {
            window.history.back(); // Redirect to the previous page
            // Alternatively, use window.location.href = 'home.html'; for home
        }, 5000);
    </script>
</head>
<body>
    <h1>Oops! 404 Error!</h1>
    <p class="goofy">Looks like you've fallen into a black hole!</p>
    <p>Don’t worry, we’ll bring you back in a jiffy!</p>
    <a class="btn" href="#">Take Me Home!</a>
</body>
</html>
