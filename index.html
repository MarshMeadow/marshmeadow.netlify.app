<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meadow</title>
    <link rel="icon" href="images/f16a67b93d7e7c64355e35851377e1eb.jpg" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            overflow: auto;
            padding: 10px;
        }

        .terminal {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 800px;
            text-align: left;
        }

        .terminal-header {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }

        .terminal-header span {
            display: block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }

        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #58a6ff;
            text-align: center;
        }

        .dropdown {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dropdown a {
            display: block;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            font-size: 1.2rem;
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease-in-out;
        }

        .dropdown a:hover {
            background-color: #58a6ff;
            color: #0d1117;
            transform: translateY(-5px);
        }

        .dropdown-content {
            display: none;
            background-color: #21262d;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }

        .dropdown.active .dropdown-content {
            display: block;
            max-height: 300px;
        }

        footer {
            margin-top: 30px;
            font-size: 1rem;
            text-align: center;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>
        <h1>~/Welcome to Meadow's Links</h1>

        <div class="dropdown">
            <a href="javascript:void(0)" onclick="toggleDropdown(this)">Gaming</a>
            <div class="dropdown-content">
                <a href="https://discord.gg/yourserverlink" target="_blank">Join My Discord</a>
                <a href="https://steamcommunity.com/id/yoursteamid" target="_blank">Steam Profile</a>
                <a href="https://www.reddit.com/user/yourredditusername" target="_blank">Reddit Profile</a>
            </div>
        </div>

        <div class="dropdown">
            <a href="javascript:void(0)" onclick="toggleDropdown(this)">Social</a>
            <div class="dropdown-content">
                <a href="https://en.pronouns.page/@marshmeadow" target="_blank">Pronouns</a>
                <a href="https://github.com/MarshMeadow" target="_blank">GitHub</a>
                <a href="https://neko-dns.netlify.app" target="_blank">Neko DNS</a>
                <a href="https://xspottv.netlify.app/" target="_blank">XSpot TV</a>
                <a href="https://hdopro.neocities.org/" target="_blank">HDO Pro</a>
            </div>
        </div>

        <div class="dropdown">
            <a href="javascript:void(0)" onclick="toggleDropdown(this)">Personal Projects</a>
            <div class="dropdown-content">
                <a href="https://yourprojectwebsite.com" target="_blank">Project 1</a>
                <a href="https://yoursecondproject.com" target="_blank">Project 2</a>
                <a href="https://github.com/MarshMeadow/my-private-repo" target="_blank">Private Repo</a>
            </div>
        </div>

        <footer>
            <p>&#169; 2024 Meadow | Linux Inspired</p>
        </footer>
    </div>

    <script>
        function toggleDropdown(element) {
            const parent = element.parentElement;
            parent.classList.toggle('active');
        }
    </script>
</body>
</html>
