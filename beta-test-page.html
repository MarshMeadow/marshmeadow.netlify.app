<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meadow - Modern Bio</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88599122?v=4" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .bio-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .bio {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            background: white;
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
            color: #667eea;
        }

        .link-btn svg {
            width: 20px;
            height: 20px;
        }

        .dropdown {
            margin-bottom: 12px;
        }

        .dropdown-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dropdown-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234,  0.4);
        }

        .dropdown-toggle .arrow {
            transition: transform 0.3s ease;
        }

        .dropdown.active .dropdown-toggle .arrow {
            transform: rotate(180deg);
        }

        .dropdown-content {
            display: none;
            margin-top: 8px;
            animation: slideDown 0.3s ease;
        }

        .dropdown.active .dropdown-content {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-content a {
            display: block;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border: 1px solid #e0e0e0;
        }

        .dropdown-content a:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 0.85rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .bio-card {
                padding: 30px 20px;
                max-width: 100%;
            }

            h1 {
                font-size: 1.5rem;
            }

            .bio {
                font-size: 0.9rem;
            }

            .link-btn, .dropdown-toggle {
                padding: 14px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
