```html
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Unavailable</title>
  <style>
    :root{
      --bg: #0b1220;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2a44;
      --shadow: rgba(0,0,0,.35);
      --btn: #2563eb;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 22px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 10px 28px var(--shadow);
    }
    h1 { margin: 0 0 10px; font-size: 1.5rem; }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.5; }
    .btn {
      display: inline-block;
      background: var(--btn);
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(37, 99, 235, .25);
    }
    .hint { margin-top: 14px; color: #94a3b8; font-size: 0.95rem; }
    /* In case the browser has a light theme preference, keep ours dark */
    @media (prefers-color-scheme: light) {
      body, .card { background: var(--bg); color: var(--text); }
    }
  </style>
  <script>
    const target = "https://marshmeadow.netlify.app/";
    setTimeout(() => { window.location.href = target; }, 30000);
  </script>
</head>
<body>
  <div class="card">
    <h1>This page is no longer available</h1>
    <p>You’ll be redirected in 30 seconds. Or you can go now using the button below.</p>
    <a class="btn" href="https://marshmeadow.netlify.app/" rel="noopener">Go to marshmeadow</a>
    <div class="hint">Redirecting automatically…</div>
  </div>
</body>
</html>
