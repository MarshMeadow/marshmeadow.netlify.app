<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meadow's Repositories</title>
    <meta name="description" content="Explore Meadow's GitHub repositories and projects.">
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88599122?v=4" type="image/png">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Meadow's Repositories">
    <meta property="og:description" content="Explore my GitHub projects and contributions">
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/88599122?v=4">
    <meta property="og:url" content="https://marshmeadow.netlify.app/repos">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(30, 30, 40, 0.95);
            --header-bg: rgba(20, 20, 30, 0.98);
            --search-bg: rgba(25, 25, 35, 0.95);
            --border-color: #3a3a4e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #888;
            --accent-color: #667eea;
            --accent-hover: #764ba2;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --glow-color: rgba(102, 126, 234, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-color);
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .header p {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            border: none;
        }

        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--glow-color);
        }

        .back-link.secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            margin-left: 10px;
        }

        .back-link.secondary:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .search-container {
            background: var(--search-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .search-box {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 15, 25, 0.9);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .org-filter {
            background: var(--search-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.3s backwards;
        }

        .org-filter h3 {
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .org-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-top: 15px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .filter-select {
            padding: 8px 12px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .org-btn {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .org-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .org-btn.active {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            border-color: transparent;
            color: white;
        }

        .org-btn img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .popular-section {
            background: var(--search-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.4s backwards;
        }

        .popular-section h3 {
            color: var(--text-primary);
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popular-section h3 svg {
            color: #ffd700;
            width: 24px;
            height: 24px;
        }

        .popular-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .popular-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .popular-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px var(--shadow-color), 0 0 20px var(--glow-color);
        }

        .popular-card .repo-name {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .popular-card .repo-description {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .popular-card .repo-stats {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .repo-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-color), var(--accent-hover));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .repo-card:hover::before {
            transform: scaleX(1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .repo-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px var(--shadow-color), 0 0 30px var(--glow-color);
        }

        .repo-name {
            color: var(--accent-color);
            font-size: 1.3rem;
            margin-bottom: 12px;
            word-break: break-word;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            transition: color 0.3s ease;
        }

        .repo-card:hover .repo-name {
            color: var(--accent-hover);
        }

        .repo-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 18px;
            line-height: 1.6;
            min-height: 45px;
            transition: color 0.3s ease;
        }

        .repo-stats {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .repo-card:hover .stat {
            color: var(--text-primary);
        }

        .stat svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .repo-card:hover .stat svg {
            transform: scale(1.2);
        }

        .repo-language {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 15px;
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            width: fit-content;
            transition: all 0.3s ease;
        }

        .repo-card:hover .repo-language {
            background: rgba(102, 126, 234, 0.2);
            color: var(--text-primary);
        }

        .repo-owner {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 12px;
            padding: 6px 10px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 6px;
        }

        .repo-owner img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .repo-owner span {
            font-weight: 500;
        }

        .language-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 95, 86, 0.1);
            border: 2px solid #ff5f56;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            color: #ff5f56;
            margin-bottom: 30px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            font-size: 1.2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .no-results svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 12px 24px;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .pagination button:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--glow-color);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .pagination button.active {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 20px var(--glow-color);
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
            transition: fill 0.3s ease;
        }

        .theme-toggle .sun-icon {
            display: none;
        }

        .theme-toggle .moon-icon {
            display: block;
        }

        body.light-mode .theme-toggle .sun-icon {
            display: block;
        }

        body.light-mode .theme-toggle .moon-icon {
            display: none;
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --header-bg: rgba(255, 255, 255, 0.98);
            --search-bg: rgba(255, 255, 255, 0.95);
            --border-color: #e0e0e0;
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --text-muted: #888;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --glow-color: rgba(102, 126, 234, 0.4);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease-out 0.5s backwards;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            text-decoration: underline;
            color: var(--accent-hover);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .repos-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .search-container {
                padding: 20px;
            }

            .repo-card {
                padding: 20px;
            }

            .theme-toggle {
                top: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .repo-name {
                font-size: 1.1rem;
            }

            .repo-description {
                font-size: 0.9rem;
            }

            .back-link {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">

        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>

    <div class="container">
        <div class="header">
            <a href="https://marshmeadow.netlify.app/" class="back-link">← Back to Bio</a>
            <h1>~/Meadow's Repositories</h1>
            <p>Explore my GitHub projects and contributions</p>
            <a href="https://github.com/MarshMeadow?tab=repositories" target="_blank" class="back-link secondary">View on GitHub →</a>
        </div>

        <div class="search-container">
            <input 
                type="text" 
                class="search-box" 
                id="searchInput" 
                placeholder="Search repositories..."
                autocomplete="off"
            >
        </div>

        <div id="orgFilter" class="org-filter" style="display: none;">
            <h3>Filter by Owner</h3>
            <div class="org-buttons" id="orgButtons"></div>
            <div class="filter-section">
                <div class="filter-group">
                    <label>Sort by:</label>
                    <select class="filter-select" id="sortSelect" onchange="sortRepos()">
                        <option value="updated">Recently Updated</option>
                        <option value="stars">Most Stars</option>
                        <option value="forks">Most Forks</option>
                        <option value="name">Name (A-Z)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Language:</label>
                    <select class="filter-select" id="langSelect" onchange="filterByLanguage()">
                        <option value="all">All Languages</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="popularSection" class="popular-section" style="display: none;">
            <h3>
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Popular Repositories
            </h3>
            <div id="popularGrid" class="popular-grid"></div>
        </div>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading repositories...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="reposGrid" class="repos-grid"></div>

        <div id="noResults" class="no-results" style="display: none;">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <p>No repositories found matching your search.</p>
        </div>

        <div id="pagination" class="pagination" style="display: none;"></div>

        <div class="footer">
            <p>© 2024 Meadow</p>
            <p style="margin-top: 10px;"><a href="https://marshmeadow.netlify.app/">← Back to Bio</a> | <a href="https://marshmeadow.netlify.app/gallery">Gallery</a></p>
        </div>
    </div>

    <script>
        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLightMode = document.body.classList.contains('light-mode');
            localStorage.setItem('lightMode', isLightMode);
        }

        // Load saved theme
        if (localStorage.getItem('lightMode') === 'true') {
            document.body.classList.add('light-mode');
        }

        const USERNAME = 'MarshMeadow';
        const REPOS_PER_PAGE = 9;
        let allRepos = [];
        let filteredRepos = [];
        let currentPage = 1;
        let organizations = [];
        let selectedOrg = null;

        // Language colors
        const languageColors = {
            'JavaScript': '#f1e05a',
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'Java': '#b07219',
            'C++': '#f34b7d',
            'C': '#555555',
            'C#': '#239120',
            'Ruby': '#701516',
            'Go': '#00ADD8',
            'Rust': '#dea584',
            'PHP': '#4F5D95',
            'Swift': '#F05138',
            'Kotlin': '#A97BFF',
            'Dart': '#00B4AB',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Shell': '#89e051',
            'Vue': '#41b883',
            'React': '#61dafb',
            'null': '#8b949e'
        };

        async function fetchRepos() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const reposGrid = document.getElementById('reposGrid');

            try {
                let repos = [];
                
                // Fetch user's personal repos
                let page = 1;
                let hasMore = true;
                while (hasMore) {
                    const response = await fetch(`https://api.github.com/users/${USERNAME}/repos?page=${page}&per_page=100&sort=updated`);
                    
                    if (!response.ok) {
                        throw new Error('Failed to fetch repositories');
                    }

                    const data = await response.json();
                    
                    if (data.length === 0) {
                        hasMore = false;
                    } else {
                        repos = repos.concat(data.map(repo => ({...repo, owner_type: 'user', owner_name: USERNAME})));
                        page++;
                    }

                    if (repos.length >= 300) {
                        hasMore = false;
                    }
                }

                // Fetch user's organizations
                const orgsResponse = await fetch(`https://api.github.com/users/${USERNAME}/orgs`);
                if (orgsResponse.ok) {
                    const orgsData = await orgsResponse.json();
                    organizations = orgsData;
                    
                    // Fetch repos from each organization
                    for (const org of orgsData) {
                        let orgPage = 1;
                        let orgHasMore = true;
                        while (orgHasMore) {
                            const orgReposResponse = await fetch(`https://api.github.com/orgs/${org.login}/repos?page=${orgPage}&per_page=100&sort=updated`);
                            
                            if (orgReposResponse.ok) {
                                const orgReposData = await orgReposResponse.json();
                                
                                if (orgReposData.length === 0) {
                                    orgHasMore = false;
                                } else {
                                    repos = repos.concat(orgReposData.map(repo => ({...repo, owner_type: 'organization', owner_name: org.login, org_avatar: org.avatar_url})));
                                    orgPage++;
                                }

                                if (repos.length >= 500) {
                                    orgHasMore = false;
                                }
                            } else {
                                orgHasMore = false;
                            }
                        }
                    }
                }

                allRepos = repos;
                filteredRepos = repos;
                loading.style.display = 'none';
                displayOrgFilter();
                displayPopularRepos();
                displayRepos();
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Error: ${err.message}. Please try again later.`;
            }
        }

        function displayOrgFilter() {
            const orgFilter = document.getElementById('orgFilter');
            const orgButtons = document.getElementById('orgButtons');
            const langSelect = document.getElementById('langSelect');
            
            if (organizations.length === 0) {
                orgFilter.style.display = 'none';
                return;
            }

            orgFilter.style.display = 'block';
            orgButtons.innerHTML = '';

            // Add "All" button
            const allBtn = document.createElement('button');
            allBtn.className = 'org-btn active';
            allBtn.textContent = 'All Repos';
            allBtn.onclick = () => filterByOrg(null);
            orgButtons.appendChild(allBtn);

            // Add user's personal repos button
            const userBtn = document.createElement('button');
            userBtn.className = 'org-btn';
            userBtn.innerHTML = `<img src="https://avatars.githubusercontent.com/u/88599122?v=4" alt="${USERNAME}"> ${USERNAME}`;
            userBtn.onclick = () => filterByOrg(USERNAME);
            orgButtons.appendChild(userBtn);

            // Add organization buttons
            organizations.forEach(org => {
                const orgBtn = document.createElement('button');
                orgBtn.className = 'org-btn';
                orgBtn.innerHTML = `<img src="${org.avatar_url}" alt="${org.login}"> ${org.login}`;
                orgBtn.onclick = () => filterByOrg(org.login);
                orgButtons.appendChild(orgBtn);
            });

            // Populate language filter
            const languages = [...new Set(allRepos.map(repo => repo.language).filter(Boolean))];
            languages.sort().forEach(lang => {
                const option = document.createElement('option');
                option.value = lang;
                option.textContent = lang;
                langSelect.appendChild(option);
            });
        }

        function filterByOrg(orgName) {
            selectedOrg = orgName;
            
            // Update button states
            const buttons = document.querySelectorAll('.org-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if (orgName === null) {
                buttons[0].classList.add('active');
                filteredRepos = allRepos;
            } else {
                const targetBtn = Array.from(buttons).find(btn => btn.textContent.includes(orgName));
                if (targetBtn) targetBtn.classList.add('active');
                filteredRepos = allRepos.filter(repo => repo.owner_name === orgName);
            }

            applyFilters();
        }

        function filterByLanguage() {
            applyFilters();
        }

        function sortRepos() {
            applyFilters();
        }

        function applyFilters() {
            const langSelect = document.getElementById('langSelect');
            const sortSelect = document.getElementById('sortSelect');
            const selectedLang = langSelect.value;
            const sortBy = sortSelect.value;

            // Start with organization filter
            let repos = selectedOrg === null ? allRepos : allRepos.filter(repo => repo.owner_name === selectedOrg);

            // Apply language filter
            if (selectedLang !== 'all') {
                repos = repos.filter(repo => repo.language === selectedLang);
            }

            // Apply sorting
            switch (sortBy) {
                case 'stars':
                    repos.sort((a, b) => b.stargazers_count - a.stargazers_count);
                    break;
                case 'forks':
                    repos.sort((a, b) => b.forks_count - a.forks_count);
                    break;
                case 'name':
                    repos.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                default:
                    repos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
            }

            filteredRepos = repos;
            currentPage = 1;
            displayRepos();
        }

        function displayPopularRepos() {
            const popularSection = document.getElementById('popularSection');
            const popularGrid = document.getElementById('popularGrid');
            
            // Get top repos by stars
            const popularRepos = [...allRepos].sort((a, b) => b.stargazers_count - a.stargazers_count).slice(0, 6);
            
            if (popularRepos.length === 0) {
                popularSection.style.display = 'none';
                return;
            }

            popularSection.style.display = 'block';
            popularGrid.innerHTML = '';

            popularRepos.forEach((repo, index) => {
                const card = document.createElement('div');
                card.className = 'popular-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.onclick = () => window.open(repo.html_url, '_blank');

                card.innerHTML = `
                    <div class="repo-name">${repo.name}</div>
                    <div class="repo-description">${repo.description || 'No description available'}</div>
                    <div class="repo-stats">
                        <span>★ ${repo.stargazers_count}</span>
                        <span>⑂ ${repo.forks_count}</span>
                    </div>
                `;

                popularGrid.appendChild(card);
            });
        }

        function displayRepos() {
            const reposGrid = document.getElementById('reposGrid');
            const noResults = document.getElementById('noResults');
            const pagination = document.getElementById('pagination');

            reposGrid.innerHTML = '';

            if (filteredRepos.length === 0) {
                noResults.style.display = 'block';
                pagination.style.display = 'none';
                return;
            }

            noResults.style.display = 'none';

            const startIndex = (currentPage - 1) * REPOS_PER_PAGE;
            const endIndex = startIndex + REPOS_PER_PAGE;
            const reposToShow = filteredRepos.slice(startIndex, endIndex);

            reposToShow.forEach((repo, index) => {
                const card = createRepoCard(repo, index);
                reposGrid.appendChild(card);
            });

            if (filteredRepos.length > REPOS_PER_PAGE) {
                displayPagination();
            } else {
                pagination.style.display = 'none';
            }
        }

        function createRepoCard(repo, index) {
            const card = document.createElement('div');
            card.className = 'repo-card';
            card.style.animationDelay = `${index * 0.1}s`;
            card.onclick = () => window.open(repo.html_url, '_blank');

            const languageColor = languageColors[repo.language] || languageColors['null'];
            const ownerAvatar = repo.org_avatar || `https://avatars.githubusercontent.com/u/88599122?v=4`;

            card.innerHTML = `
                <div class="repo-owner">
                    <img src="${ownerAvatar}" alt="${repo.owner_name}">
                    <span>${repo.owner_name}</span>
                </div>
                <div class="repo-name">${repo.name}</div>
                <div class="repo-description">${repo.description || 'No description available'}</div>
                <div class="repo-stats">
                    <div class="stat">
                        <svg fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
                        </svg>
                        ${repo.stargazers_count}
                    </div>
                    <div class="stat">
                        <svg fill="currentColor" viewBox="0 0 16 16">
                            <path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"/>
                        </svg>
                        ${repo.forks_count}
                    </div>
                </div>
                <div class="repo-language">
                    <div class="language-dot" style="background-color: ${languageColor};"></div>
                    ${repo.language || 'Unknown'}
                </div>
            `;

            return card;
        }

        function displayPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredRepos.length / REPOS_PER_PAGE);

            pagination.innerHTML = '';
            pagination.style.display = 'flex';

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '←';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayRepos();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            pagination.appendChild(prevBtn);

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = currentPage === i ? 'active' : '';
                pageBtn.onclick = () => {
                    currentPage = i;
                    displayRepos();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                pagination.appendChild(pageBtn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '→';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayRepos();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            pagination.appendChild(nextBtn);
        }

        function searchRepos(query) {
            const searchTerm = query.toLowerCase().trim();
            
            // Start with current filtered repos (from org/lang filters)
            let baseRepos = selectedOrg === null ? allRepos : allRepos.filter(repo => repo.owner_name === selectedOrg);
            
            // Apply language filter if selected
            const langSelect = document.getElementById('langSelect');
            if (langSelect && langSelect.value !== 'all') {
                baseRepos = baseRepos.filter(repo => repo.language === langSelect.value);
            }
            
            // Apply search
            if (searchTerm === '') {
                filteredRepos = baseRepos;
            } else {
                filteredRepos = baseRepos.filter(repo => {
                    return (
                        repo.name.toLowerCase().includes(searchTerm) ||
                        (repo.description && repo.description.toLowerCase().includes(searchTerm)) ||
                        (repo.language && repo.language.toLowerCase().includes(searchTerm))
                    );
                });
            }

            // Apply sorting
            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect) {
                switch (sortSelect.value) {
                    case 'stars':
                        filteredRepos.sort((a, b) => b.stargazers_count - a.stargazers_count);
                        break;
                    case 'forks':
                        filteredRepos.sort((a, b) => b.forks_count - a.forks_count);
                        break;
                    case 'name':
                        filteredRepos.sort((a, b) => a.name.localeCompare(b.name));
                        break;
                    default:
                        filteredRepos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                }
            }

            currentPage = 1;
            displayRepos();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchRepos(e.target.value);
        });

        // Initialize
        fetchRepos();
    </script>
</body>
</html>
