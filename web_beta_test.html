<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meadow</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-image: url('https://marshmeadow.netlify.app/Images/retro-vintage-computer-minimal-4k-ts-3840x2400.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            overflow: auto;
            padding: 10px;
        }

        .terminal {
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 800px;
            text-align: left;
            z-index: 1;
        }

        .terminal-header {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }

        .terminal-header span {
            display: block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }

        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            color: #58a6ff;
            text-align: center;
        }

        .about {
            font-size: 1.1rem;
            color: #c9d1d9;
            margin-bottom: 20px;
            text-align: center;
        }

        .dropdown {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dropdown a {
            display: block;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            font-size: 1.2rem;
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease-in-out;
        }

        .dropdown a:hover {
            background-color: #58a6ff;
            color: #0d1117;
            transform: translateY(-5px);
        }

        .dropdown-content {
            display: none;
            background-color: #21262d;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }

        .dropdown.active .dropdown-content {
            display: block;
            max-height: 300px;
        }

        footer {
            margin-top: 30px;
            font-size: 1rem;
            text-align: center;
            color: #8b949e;
        }

        .footer-note {
            font-size: 0.9rem;
            color: #ff5f56;
            margin-top: 10px;
            text-align: center;
        }

        .backup-link {
            font-size: 1rem;
            color: #58a6ff;
            text-align: center;
            margin-top: 20px;
        }

        .backup-link a {
            color: #58a6ff;
            text-decoration: none;
            transition: all 0.3s ease-in-out;
        }

        .backup-link a:hover {
            color: #c9d1d9;
        }
