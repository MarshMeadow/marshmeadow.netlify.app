<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossy Dark Window</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f0f10, #1a1a1c);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .window {
      width: 400px;
      height: 250px;
      background: rgba(30, 30, 30, 0.5);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .title-bar {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title-bar span {
      color: #fff;
      font-weight: 500;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .buttons div {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .close { background: #ff5f57; }
    .minimize { background: #ffbd2e; }
    .maximize { background: #28c940; }

    .content {
      flex: 1;
      padding: 20px;
      color: #ddd;
      font-size: 15px;
    }

    .content p {
      opacity: 0.8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">
      <div class="buttons">
        <div class="close"></div>
        <div class="minimize"></div>
        <div class="maximize"></div>
      </div>
      <span>Glossy Window</span>
      <div></div>
    </div>
    <div class="content">
      <p>This is a glossy, glass-like dark window inspired by Windows 11.</p>
    </div>
  </div>
</body>
</html>
